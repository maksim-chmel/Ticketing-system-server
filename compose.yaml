services:
  adminpanel-back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adminpanel-back
    ports:
      - "5101:8080"
    restart: unless-stopped
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - DefaultConnection=${DefaultConnection}
    env_file:
      - .env 