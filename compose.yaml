version: '3.8'

services:
  adminpanel-back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adminpanel-back
    ports:
      - "5101:8080"
    restart: unless-stopped
    environment:
      - JWT__SecretKey=${JWT_SECRET_KEY}
      - JWT__Issuer=${JWT_ISSUER}
      - JWT__Audience=${JWT_AUDIENCE}
      - DefaultConnection=${DefaultConnection}
    env_file:
      - .env 