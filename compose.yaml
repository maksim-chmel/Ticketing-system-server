services:
 
  adminpanel-back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adminpanel-back
    ports:
      - "5101:8080"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=feedbackdb;Username=postgres;Password=${DB_PASSWORD}
    env_file:
      - .env
    networks:
      - feedback_net 

 
  db:
    image: postgres:16-alpine
    container_name: adminpanel-db
    restart: always
    environment:
      - POSTGRES_DB=feedbackdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - feedback_net 

volumes:
  postgres_data:


networks:
  feedback_net:
    name: feedback_shared_network 