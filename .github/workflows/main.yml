name: Self-hosted Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest backend code and restart containers
        run: |
          cd ~/AdminPanelBack
          git pull origin main
          
          docker rm -f adminpanel-back || true
          
          docker compose down
          
          docker compose up -d --build
