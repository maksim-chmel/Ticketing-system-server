name: Self-hosted Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest backend code
        run: |
          cd ~/AdminPanelBack
          git pull origin main

      - name: Inject secrets into .env file
        run: |
          cd ~/AdminPanelBack
          cat <<EOF > .env
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          JWT_ISSUER=${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
          JWT_EXPIRES_IN_MINUTES=${{ secrets.JWT_EXPIRES_IN_MINUTES }}
          DefaultConnection=${{ secrets.DefaultConnection }}
          EOF

      - name: Restart Docker containers
        run: |
          cd ~/AdminPanelBack
          docker rm -f adminpanel-back || true
          docker compose down
          docker compose up -d --build
